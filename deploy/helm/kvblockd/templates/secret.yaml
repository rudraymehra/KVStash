{{- if not .Values.namespaces.existingSecret }}
{{- if not .Values.namespaces.entries }}
{{- fail "namespaces.entries is empty and no namespaces.existingSecret is set — a daemon with no namespaces accepts no clients (secure by default, useless by accident)" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kvblockd.fullname" . }}-namespaces
  labels:
    {{- include "kvblockd.labels" . | nindent 4 }}
type: Opaque
stringData:
  namespaces.yaml: |
    # Rendered by the kvblockd Helm chart — namespace identity + bearer
    # tokens. Prefer token_sha256 entries in values so the chart never
    # carries a plaintext credential.
    namespaces:
      {{- toYaml .Values.namespaces.entries | nindent 6 }}
{{- end }}
