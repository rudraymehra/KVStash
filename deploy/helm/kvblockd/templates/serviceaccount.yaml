{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kvblockd.serviceAccountName" . }}
  labels:
    {{- include "kvblockd.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  # IRSA: an eks.amazonaws.com/role-arn annotation here is how the S3 tier
  # gets credentials — kvblockd reads only the ambient AWS chain.
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
