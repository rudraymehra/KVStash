apiVersion: v2
name: kvblockd
description: >-
  kvblockd — KV-cache block store daemon: batched multi-stream TCP,
  DRAM->NVMe->S3 tiering, namespace multi-tenancy. A plain chart, no
  operator (locked non-goal): one StatefulSet, config from a ConfigMap,
  namespaces/tokens from a Secret.
