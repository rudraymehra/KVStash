# Digest-pinned baseline services for Chart #1 (methodology rules 3, 4, 7).
# Digests are PENDING until the rig pulls them (bench/VERSIONS.lock) — a chart
# built against a PENDING digest is not publishable. One store per profile so
# a cell runs exactly one baseline at a time on node B, host networking for
# the same wire the kvblockd bar uses.
#
#   docker compose --profile redis  up -d
#   docker compose --profile valkey up -d
#   docker compose --profile mooncake up -d
#
# maxmemory is set per-cell on the command line (see run.sh), NOT here, so
# the same image serves every capacity point.

services:
  redis:
    profiles: ["redis"]
    image: redis:7.4  # @sha256:PENDING — record at pull
    network_mode: host
    command: >
      redis-server
      --save ""
      --appendonly no
      --maxmemory-policy allkeys-lru
      --io-threads 8
      --port 6379
    # NOTE: kvbench --target redis dials :6379; run-chart1.sh points its
    # go-redis client at this port for the baseline cells.

  valkey:
    profiles: ["valkey"]
    image: valkey/valkey:8.1  # @sha256:PENDING — record at pull
    network_mode: host
    command: >
      valkey-server
      --save ""
      --appendonly no
      --maxmemory-policy allkeys-lru
      --io-threads 8
      --port 6379

  etcd:
    profiles: ["mooncake"]
    image: quay.io/coreos/etcd:v3.5.17  # @sha256:PENDING — Mooncake metadata only
    network_mode: host
    command: >
      /usr/local/bin/etcd
      --listen-client-urls http://0.0.0.0:2379
      --advertise-client-urls http://127.0.0.1:2379

  mooncake:
    profiles: ["mooncake"]
    image: kvcache-ai/mooncake:latest  # @sha256:PENDING — pin the tag at the rig
    network_mode: host
    depends_on: [etcd]
    # protocol="tcp"; non-default knobs documented at the rig session (the
    # driver + config are authored then — see baselines/README.md). If a
    # stable TCP config cannot be reproduced in the 3h timebox, the bar ships
    # as "could not reproduce a stable config — configs+errors published,
    # standing re-run offer" (methodology rule 4).
    command: ["mooncake_master", "--protocol", "tcp"]
