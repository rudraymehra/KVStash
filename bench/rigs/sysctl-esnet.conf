# ESnet-derived 100G host tuning for the kvblockd transport rigs.
# Applied to every benchmark node (incl. baselines) so results are comparable —
# this same file ships to customers: tuning is product.
# Source: https://fasterdata.es.net/host-tuning/linux/100g-tuning/
# Apply: sudo sysctl -p bench/rigs/sysctl-esnet.conf

# Fair-queue qdisc: enables per-flow pacing (prereq for MSG_ZEROCOPY to help,
# and eliminates the retransmit bursts that cap multi-stream throughput).
net.core.default_qdisc = fq

# Max socket buffer sizes (bytes). 256 MiB ceilings let TCP window-scale open up
# on a fat 50-100 GbE pipe; the middle value is the autotuned default.
net.core.rmem_max = 268435456
net.core.wmem_max = 268435456
net.ipv4.tcp_rmem = 4096 87380 268435456
net.ipv4.tcp_wmem = 4096 65536 268435456

# Per-socket option memory (ancillary/control). MSG_ZEROCOPY completion
# notifications need headroom here or sends silently fall back to copying.
net.core.optmem_max = 1048576

# Accept-queue depth so a burst of parallel connections isn't dropped at listen.
net.core.somaxconn = 4096
net.ipv4.tcp_max_syn_backlog = 8192

# Modern loss recovery / congestion control for high-BDP links.
net.ipv4.tcp_congestion_control = bbr
net.ipv4.tcp_mtu_probing = 1

# NOTE: busy-polling is left OFF by default (disclosed) — it trades CPU for
# latency and would muddy the CPU-cores-per-GB/s number we report.
