name: fuzz

on:
  schedule:
    - cron: "0 2 * * 0" # Sunday 02:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  long-fuzz:
    runs-on: ubuntu-24.04
    timeout-minutes: 480
    strategy:
      fail-fast: false
      matrix:
        include:
          - func: FuzzParseHeader
            pkg: ./internal/protocol
          - func: FuzzParseBatch
            pkg: ./internal/protocol
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: fuzz 3h
        run: |
          set -o pipefail
          go test -fuzz="^${FUNC}$" -fuzztime=3h "$PKG" || echo "CRASH=1" >> "$GITHUB_ENV"
        env:
          FUNC: ${{ matrix.func }}
          PKG: ${{ matrix.pkg }}
      - name: upload corpus and crashers
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: corpus-${{ matrix.func }}
          path: "**/testdata/fuzz/**"
          if-no-files-found: ignore
      - name: open crash issue
        if: env.CRASH == '1'
        env:
          GH_TOKEN: ${{ github.token }}
          FUNC: ${{ matrix.func }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          gh issue create --repo "$REPO" \
            --title "Weekly fuzz crash: $FUNC" \
            --body "A fuzz target crashed. See the corpus artifact on run $RUN_ID."
      - name: fail the job on crash
        if: env.CRASH == '1'
        run: |
          echo "fuzz target ${{ matrix.func }} crashed — see the filed issue" >&2
          exit 1
