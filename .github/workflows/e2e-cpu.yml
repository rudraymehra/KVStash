name: e2e-cpu

# Cost: the CPU e2e (builds vLLM, ~90min) is dispatch-only + PR-path-triggered while private.
on:
  workflow_dispatch: {}
  pull_request:
    paths:
      - "python/**"
      - "internal/protocol/**"
      - "bench/e2e/cpu/**"
      - "bench/e2e/sglang/**"
      - ".github/workflows/e2e-cpu.yml"

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: false
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: build kvblockd
        run: go build -o bin/kvblockd ./cmd/kvblockd
      - name: start daemon (DRAM-only)
        run: |
          ./bin/kvblockd -config bench/e2e/cpu/kvblockd.yaml > /tmp/kvbd.log 2>&1 &
          echo $! > /tmp/kvbd.pid
          bash scripts/wait-healthz.sh 127.0.0.1:9442 30
      - name: cache pip + wheels
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: e2e-cpu-${{ hashFiles('bench/e2e/cpu/versions.env') }}
      - name: install stack
        run: bash bench/e2e/cpu/install.sh
      - name: serve vLLM (CPU) + verify
        env:
          PYTHONHASHSEED: "0"
          VLLM_CPU_KVCACHE_SPACE: "1"
          OMP_NUM_THREADS: "1"
        run: |
          set -o pipefail
          source bench/e2e/cpu/versions.env
          vllm serve "$MODEL" --port 18000 --dtype bfloat16 --max-model-len 2048 \
            --max-num-seqs 1 --no-enable-prefix-caching \
            --kv-transfer-config "$(cat bench/e2e/cpu/kv_transfer_kvblockd.json)" \
            > /tmp/vllm.log 2>&1 &
          echo $! > /tmp/vllm.pid
          bash scripts/wait-http.sh http://127.0.0.1:18000/health 600
          python bench/e2e/cpu/verify.py --vllm http://127.0.0.1:18000 --metrics http://127.0.0.1:9442
      - name: restart vLLM, hits must persist (property d)
        env:
          PYTHONHASHSEED: "0"
          VLLM_CPU_KVCACHE_SPACE: "1"
          OMP_NUM_THREADS: "1"
        run: |
          set -o pipefail
          source bench/e2e/cpu/versions.env
          kill "$(cat /tmp/vllm.pid)" 2>/dev/null || true
          sleep 3
          # kvblockd stays up; a fresh vLLM must still hit the cache it wrote.
          vllm serve "$MODEL" --port 18000 --dtype bfloat16 --max-model-len 2048 \
            --max-num-seqs 1 --no-enable-prefix-caching \
            --kv-transfer-config "$(cat bench/e2e/cpu/kv_transfer_kvblockd.json)" \
            > /tmp/vllm2.log 2>&1 &
          echo $! > /tmp/vllm.pid
          bash scripts/wait-http.sh http://127.0.0.1:18000/health 600
          python bench/e2e/cpu/verify.py --vllm http://127.0.0.1:18000 --metrics http://127.0.0.1:9442 --expect-hits
      - name: logs
        if: always()
        run: |
          echo "=== daemon ==="; tail -50 /tmp/kvbd.log 2>/dev/null || true
          echo "=== vllm ==="; tail -50 /tmp/vllm.log 2>/dev/null || true
          echo "=== vllm (post-restart) ==="; tail -50 /tmp/vllm2.log 2>/dev/null || true
      - name: upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-cpu-logs
          path: |
            /tmp/kvbd.log
            /tmp/vllm.log
            /tmp/vllm2.log
          if-no-files-found: ignore

  # A6-style tripwire for socket #4 (SGLang HiCache, wk 12). CPU-only, no
  # GPU, no model download: (1) the backend imports + instantiates with NO
  # sglang installed (shim ABC), (2) the CPU unit suite runs against a
  # daemon built from source, (3) the pinned sglang release installs and
  # the backend subclasses the REAL HiCacheStorage ABC — interface drift
  # trips THIS job, not a partner deployment. The GPU e2e itself is
  # DEFERred (docs/design/sglang-hicache-v1.1.md).
  sglang-cpu:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: false
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: install CPU torch + backend (NO sglang yet)
        run: |
          pip install pytest blake3 xxhash
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install --no-deps ./python/kvblockd ./python/sglang_kvblockd
      - name: import + instantiate WITHOUT sglang (shim leg)
        run: python bench/e2e/sglang/import_check.py
      - name: CPU unit suite (daemon built from source by the fixture)
        env:
          PYTHONHASHSEED: "0"
          # Correctness leg; the 1ms figure is a loopback-rig number.
          # Shared-runner scheduler jitter gets headroom, not a free pass.
          KVB_SGL_EXISTS_BUDGET_MS: "3.0"
        run: pytest python/sglang_kvblockd/tests -q
      - name: install pinned sglang (the tripwire pin)
        run: |
          source bench/e2e/sglang/versions.env
          PIP_EXTRA_INDEX_URL=https://download.pytorch.org/whl/cpu \
            pip install "sglang==$SGLANG_VERSION"
      - name: ABC import-check against real sglang (drift trips here)
        run: python bench/e2e/sglang/import_check.py --require-sglang
      - name: re-run suite against the real ABC + StorageMetrics
        env:
          PYTHONHASHSEED: "0"
          KVB_SGL_EXISTS_BUDGET_MS: "3.0"
        run: pytest python/sglang_kvblockd/tests -q
