name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: false
      - name: go vet
        run: go vet ./...
      - name: go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12
      - name: staticcheck (standalone, belt-and-braces)
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@2025.1.1
          staticcheck ./...
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

  test:
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: false
      - name: build
        run: go build ./...
      - name: test (race)
        run: go test -race -short -count=1 ./...
      - name: test (race, kvbdebug — buffer poisoning + credit ledger asserts)
        run: go test -race -short -count=1 -tags kvbdebug ./internal/...

  fuzz-short:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: false
      - name: FuzzParseHeader 90s
        run: go test -fuzz='^FuzzParseHeader$' -fuzztime=90s ./internal/protocol
      - name: FuzzParseBatch 90s
        run: go test -fuzz='^FuzzParseBatch$' -fuzztime=90s ./internal/protocol
