name: ci

# Cost note: the repo is PRIVATE, so Actions minutes bill (macOS at 10×).
# Push-time CI runs ubuntu only; the macOS cross-check runs on a weekly cron
# + manual dispatch. Flip back to per-push macОS when the repo goes public.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # Monday 06:00 UTC — the weekly macOS cross-check
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: false
      - name: go vet
        run: go vet ./...
      - name: go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
      - name: staticcheck (standalone, belt-and-braces)
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@2025.1.1
          staticcheck ./...
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: false
      - name: build
        run: go build ./...
      - name: test (race)
        run: go test -race -short -count=1 ./...
      - name: test (race, kvbdebug — buffer poisoning + credit ledger asserts)
        run: go test -race -short -count=1 -tags kvbdebug ./internal/...
      - name: modeltest (race, kvbdebug, elevated checks — the I1–I5 harness)
        run: go test -race -count=1 -tags kvbdebug -run TestStoreModel ./internal/store/modeltest -rapid.checks=200

  # macOS cross-check: weekly + on demand only (10× billing on a private repo).
  test-macos:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: false
      - name: build
        run: go build ./...
      - name: test (race)
        run: go test -race -short -count=1 ./...
      - name: test (race, kvbdebug)
        run: go test -race -short -count=1 -tags kvbdebug ./internal/...

  fuzz-short:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: false
      - name: FuzzParseHeader 90s
        run: bash .github/scripts/fuzz-short.sh FuzzParseHeader 90s
      - name: FuzzParseBatch 90s
        run: bash .github/scripts/fuzz-short.sh FuzzParseBatch 90s

  python:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: false
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: install ruff + kvblockd
        run: |
          pip install ruff pytest
          pip install -e ./python/kvblockd
      - name: ruff
        run: ruff check python/
      - name: pytest kvblockd (protocol + client-vs-daemon + hash parity)
        env:
          PYTHONHASHSEED: "0"
        run: pytest python/kvblockd/tests -q

  python-connector:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install torch (CPU) + deps
        run: |
          # pytest is NOT on the pytorch index — install it from PyPI first.
          pip install pytest numpy blake3 xxhash
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          # The connector unit suite FAKES MemoryObj and does not need lmcache
          # (adapter.py falls back to object); --no-deps keeps CI off the heavy
          # lmcache/CUDA-torch resolve.
          pip install --no-deps ./python/kvblockd ./python/lmcache_kvblockd
      - name: pytest connector (meta + fake-MemoryObj unit suite)
        env:
          PYTHONHASHSEED: "0"
        run: pytest python/lmcache_kvblockd/tests -q
