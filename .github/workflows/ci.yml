name: ci

# Cost note: the repo is PRIVATE, so Actions minutes bill (macOS at 10×).
# Push-time CI runs ubuntu only; the macOS cross-check runs on a weekly cron
# + manual dispatch. Flip back to per-push macОS when the repo goes public.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # Monday 06:00 UTC — the weekly macOS cross-check
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: false
      - name: go vet
        run: go vet ./...
      - name: go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
      - name: staticcheck (standalone, belt-and-braces)
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@2025.1.1
          staticcheck ./...
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: false
      - name: build
        run: go build ./...
      - name: build (tagged variants stay compiling — kvb_uring stub, crashtest harness)
        run: |
          go build -tags kvb_uring ./internal/store/nvme/
          go vet -tags crashtest ./test/crash/
      - name: test (race)
        run: go test -race -short -count=1 ./...
      - name: test (race, kvbdebug — buffer poisoning + credit ledger asserts)
        run: go test -race -short -count=1 -tags kvbdebug ./internal/...
      - name: modeltest (race, kvbdebug, elevated checks — the I1–I6 harness incl. crash/recovery)
        run: go test -race -count=1 -tags kvbdebug -run TestStoreModel ./internal/store/modeltest -rapid.checks=200

  # The kill -9 recovery contract on a real Linux kernel: 10 loops per push.
  # The i7i rig runs 50 on real NVMe; Docker rehearsals run 100+.
  crash-torture:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: false
      - name: 10-loop kill -9 torture (journal-after-ack oracle)
        run: go run -tags crashtest ./test/crash -loops 10 -dir "$RUNNER_TEMP/crash"

  # The same oracle with the S3 tier ON, against a REAL third-party S3
  # implementation (MinIO service): kills land mid-upload, spilled state
  # re-spills across lives, the pre-kill sweep serves any s3-resident
  # blocks as verified cold reads.
  crash-torture-s3:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: false
      # A plain docker-run step, not a service container: minio/minio needs
      # the `server /data` command and GH services cannot pass one (and the
      # self-starting bitnami images left Docker Hub in 2025).
      - name: start minio
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=tortuser -e MINIO_ROOT_PASSWORD=tort-secret-ci \
            minio/minio:latest server /data
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:9000/minio/health/ready >/dev/null && exit 0
            sleep 2
          done
          echo "minio never became ready" >&2; docker logs minio >&2; exit 1
      - name: create bucket
        env:
          AWS_ACCESS_KEY_ID: tortuser
          AWS_SECRET_ACCESS_KEY: tort-secret-ci
          AWS_REGION: us-east-1
        run: aws --endpoint-url http://127.0.0.1:9000 s3 mb s3://kvbtort
      - name: 5-loop kill -9 torture, spill to MinIO
        env:
          AWS_ACCESS_KEY_ID: tortuser
          AWS_SECRET_ACCESS_KEY: tort-secret-ci
          AWS_REGION: us-east-1
        run: go run -tags crashtest ./test/crash -loops 5 -storm-ms 8000 -s3-endpoint http://127.0.0.1:9000 -dir "$RUNNER_TEMP/crash-s3"

  # macOS cross-check: weekly + on demand only (10× billing on a private repo).
  test-macos:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: false
      - name: build
        run: go build ./...
      - name: test (race)
        run: go test -race -short -count=1 ./...
      - name: test (race, kvbdebug)
        run: go test -race -short -count=1 -tags kvbdebug ./internal/...

  fuzz-short:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: false
      - name: FuzzParseHeader 90s
        run: bash .github/scripts/fuzz-short.sh FuzzParseHeader 90s
      - name: FuzzParseBatch 90s
        run: bash .github/scripts/fuzz-short.sh FuzzParseBatch 90s

  python:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: false
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: install ruff + kvblockd
        run: |
          pip install ruff pytest
          pip install -e ./python/kvblockd
      - name: ruff
        run: ruff check python/
      - name: pytest kvblockd (protocol + client-vs-daemon + hash parity)
        env:
          PYTHONHASHSEED: "0"
        run: pytest python/kvblockd/tests -q

  python-connector:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install torch (CPU) + deps
        run: |
          # pytest is NOT on the pytorch index — install it from PyPI first.
          pip install pytest numpy blake3 xxhash
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          # The connector unit suite FAKES MemoryObj and does not need lmcache
          # (adapter.py falls back to object); --no-deps keeps CI off the heavy
          # lmcache/CUDA-torch resolve.
          pip install --no-deps ./python/kvblockd ./python/lmcache_kvblockd
      - name: pytest connector (meta + fake-MemoryObj unit suite)
        env:
          PYTHONHASHSEED: "0"
        run: pytest python/lmcache_kvblockd/tests -q
