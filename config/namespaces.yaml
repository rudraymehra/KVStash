# kvblockd namespaces — multi-tenant identity + bearer tokens.
#
# Point the daemon at this file with `namespaces_path` (or --namespaces).
# Each namespace gets its own key space and pinned-bytes quota accounting;
# a client presents the token at HELLO and lives inside its namespace for
# the connection's lifetime (structural isolation, not per-request checks).
#
# ids are operator-assigned, nonzero, and stable across restarts (they key
# on-disk ownership); never reuse an id for a different tenant.

namespaces:
  # The quickstart tenant — CHANGE OR REMOVE before exposing the daemon.
  - { name: demo, id: 1, token: "demo-token" }
  # Production entries: prefer token_sha256 (the file then carries no
  # credential — `echo -n SECRET | shasum -a 256`); per-tier byte quotas
  # (0/absent = unlimited) and a pinned-bytes quota:
  # - name: team-a
  #   id: 2
  #   token_sha256: "64-hex-chars"
  #   quota_dram:  8589934592     # 8 GiB
  #   quota_nvme:  68719476736    # 64 GiB
  #   quota_s3:    549755813888   # 512 GiB
  #   pin_quota:   1073741824     # 1 GiB
